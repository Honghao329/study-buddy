<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 学习伴侣管理后台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #4A90D9 0%, #667eea 50%, #764ba2 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.login-card { width: 420px; background: #fff; border-radius: 20px; padding: 48px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.login-header { text-align: center; margin-bottom: 36px; }
.login-header h1 { font-size: 26px; color: #333; margin-bottom: 8px; }
.login-header p { color: #999; font-size: 14px; }
.login-footer { margin-top: 24px; text-align: center; color: #ccc; font-size: 12px; }
</style>
</head>
<body>
<div id="login-app">
  <div class="login-card">
    <div class="login-header">
      <h1>学习伴侣</h1>
      <p>管理后台登录</p>
    </div>
    <el-form :model="form" @submit.prevent="handleLogin">
      <el-form-item>
        <el-input v-model="form.username" prefix-icon="User" placeholder="管理员账号" size="large" />
      </el-form-item>
      <el-form-item>
        <el-input v-model="form.password" prefix-icon="Lock" type="password" placeholder="密码" size="large" show-password @keyup.enter="handleLogin" />
      </el-form-item>
      <el-button type="primary" size="large" :loading="loading" @click="handleLogin" style="width:100%;margin-top:8px">登 录</el-button>
    </el-form>
    <div class="login-footer">学习伴侣系统 v1.0</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
<script>
const app = Vue.createApp({
  data() { return { form: { username: '', password: '' }, loading: false }; },
  mounted() { if (localStorage.getItem('admin_token')) window.location.href = './'; },
  methods: {
    async handleLogin() {
      if (!this.form.username || !this.form.password) { ElementPlus.ElMessage.warning('请输入账号和密码'); return; }
      this.loading = true;
      try {
        const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.form) });
        const data = await res.json();
        if (data.code === 200) {
          localStorage.setItem('admin_token', data.data.token);
          localStorage.setItem('admin_name', data.data.admin.username);
          ElementPlus.ElMessage.success('登录成功');
          setTimeout(() => window.location.href = './', 500);
        } else { ElementPlus.ElMessage.error(data.msg || '登录失败'); }
      } catch(e) { ElementPlus.ElMessage.error('网络错误'); }
      this.loading = false;
    }
  }
});
for (const [k, c] of Object.entries(ElementPlusIconsVue)) app.component(k, c);
app.use(ElementPlus);
app.mount('#login-app');
</script>
</body>
</html>
