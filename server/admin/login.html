<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 学习伴侣管理后台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh; display: grid; grid-template-columns: 1fr 480px;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #fafbfc;
}

/* 左侧插画区 */
.login-left {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #001529; color: #fff; position: relative; overflow: hidden;
}
.login-left::before {
  content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(64,145,247,0.12) 0%, transparent 70%);
  top: -100px; right: -100px;
}
.login-left::after {
  content: ''; position: absolute; width: 350px; height: 350px; border-radius: 50%;
  background: radial-gradient(circle, rgba(34,197,94,0.08) 0%, transparent 70%);
  bottom: -80px; left: -60px;
}
.brand-area { position: relative; z-index: 1; text-align: center; max-width: 340px; }
.brand-logo {
  width: 68px; height: 68px; background: rgba(255,255,255,0.08); border-radius: 18px;
  display: flex; align-items: center; justify-content: center; font-size: 32px;
  margin: 0 auto 24px; border: 1px solid rgba(255,255,255,0.06);
}
.brand-title { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: 2px; }
.brand-desc { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.8; }
.brand-features { margin-top: 40px; text-align: left; }
.brand-feature {
  display: flex; align-items: center; gap: 12px; font-size: 13px;
  color: rgba(255,255,255,0.5); padding: 8px 0;
}
.brand-feature-dot { width: 5px; height: 5px; border-radius: 50%; background: #4091f7; flex-shrink: 0; }

/* 右侧表单 */
.login-right {
  display: flex; align-items: center; justify-content: center;
  background: #fff; padding: 60px; border-left: 1px solid rgba(0,0,0,0.06);
}
.login-form { width: 100%; max-width: 360px; }
.login-form h2 { font-size: 24px; color: #323251; font-weight: 600; margin-bottom: 6px; }
.login-form .sub { color: #7987a1; font-size: 14px; margin-bottom: 36px; }
.form-label { font-size: 13px; color: #7987a1; font-weight: 500; margin-bottom: 6px; display: block; }
.el-form-item { margin-bottom: 22px; }
.el-input__wrapper { border-radius: 6px !important; }

.login-btn {
  width: 100%; height: 42px; border-radius: 6px; font-size: 14px; font-weight: 500;
  background: #4091f7 !important; border-color: #4091f7 !important;
  margin-top: 4px; transition: all 0.2s;
}
.login-btn:hover { background: #5ba0f8 !important; border-color: #5ba0f8 !important; }

.login-footer { margin-top: 40px; text-align: center; color: #dbdfe1; font-size: 12px; }

@media (max-width: 960px) {
  body { grid-template-columns: 1fr; }
  .login-left { display: none; }
  .login-right { border: none; }
}

@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.login-form { animation: slideIn 0.5s ease; }
</style>
</head>
<body>
<div class="login-left">
  <div class="brand-area">
    <div class="brand-logo">📖</div>
    <div class="brand-title">学习伴侣</div>
    <div class="brand-desc">记录学习点滴，结伴共同成长</div>
    <div class="brand-features">
      <div class="brand-feature"><span class="brand-feature-dot"></span>实时数据分析与可视化看板</div>
      <div class="brand-feature"><span class="brand-feature-dot"></span>用户行为与学习趋势追踪</div>
      <div class="brand-feature"><span class="brand-feature-dot"></span>内容管理与社区运营工具</div>
      <div class="brand-feature"><span class="brand-feature-dot"></span>多维度数据导出与统计</div>
    </div>
  </div>
</div>
<div class="login-right">
  <div id="login-app" class="login-form">
    <h2>欢迎回来</h2>
    <p class="sub">登录管理后台以继续</p>
    <el-form :model="form" @submit.prevent="handleLogin">
      <el-form-item>
        <label class="form-label">管理员账号</label>
        <el-input v-model="form.username" placeholder="请输入账号" size="large" />
      </el-form-item>
      <el-form-item>
        <label class="form-label">密码</label>
        <el-input v-model="form.password" type="password" placeholder="请输入密码" size="large" show-password @keyup.enter="handleLogin" />
      </el-form-item>
      <el-button class="login-btn" type="primary" size="large" :loading="loading" @click="handleLogin">登 录</el-button>
    </el-form>
    <div class="login-footer">Study Buddy Admin v1.0</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
<script>
const app = Vue.createApp({
  data() { return { form: { username: '', password: '' }, loading: false }; },
  mounted() { if (localStorage.getItem('admin_token')) window.location.href = './'; },
  methods: {
    async handleLogin() {
      if (!this.form.username || !this.form.password) { ElementPlus.ElMessage.warning('请输入账号和密码'); return; }
      this.loading = true;
      try {
        const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.form) });
        const data = await res.json();
        if (data.code === 200) {
          localStorage.setItem('admin_token', data.data.token);
          localStorage.setItem('admin_name', data.data.admin.username);
          ElementPlus.ElMessage.success('登录成功');
          setTimeout(() => window.location.href = './', 500);
        } else { ElementPlus.ElMessage.error(data.msg || '登录失败'); }
      } catch(e) { ElementPlus.ElMessage.error('网络错误'); }
      this.loading = false;
    }
  }
});
for (const [k, c] of Object.entries(ElementPlusIconsVue)) app.component(k, c);
app.use(ElementPlus);
app.mount('#login-app');
</script>
</body>
</html>
